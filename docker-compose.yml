version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: realtorhub-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: realtorhub
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: realtorhub-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/realtorhub
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_STORAGE_BUCKET: ${GCP_STORAGE_BUCKET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}

  # ── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: realtorhub-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

  # ── Mongo Express (Dev Admin UI) ─────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: realtorhub-mongo-admin
    restart: unless-stopped
    ports:
      - '8081:8081'
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    profiles:
      - dev

volumes:
  mongo_data:
    driver: local
