steps:
  # ── Build Backend ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:latest'
      - './backend'
    id: 'build-backend'

  # ── Build Frontend ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:latest'
      - './frontend'
    id: 'build-frontend'

  # ── Push Backend ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:latest'
    waitFor: ['push-backend']

  # ── Push Frontend ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:$COMMIT_SHA'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:latest'
    waitFor: ['push-frontend']

  # ── Deploy Backend to Cloud Run ────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'realtorhub-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=5000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--allow-unauthenticated'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ── Deploy Frontend to Cloud Run ───────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'realtorhub-web'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=80'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

substitutions:
  _REGION: northamerica-northeast1

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/api:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/realtorhub/web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
